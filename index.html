<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Open Sans',sans-serif;background:#fff;color:#1f2937;}
a{text-decoration:none;color:inherit;}
img{max-width:100%;}
:root{
  --green:#2D6B5A; --green-dark:#1a3d2f; --green-mid:#3d8b6a; --green-pale:#f0faf6; --green-border:#c8e6d8;
  --gold:#C8862A; --gold-light:#E8A84A; --gold-pale:#fdf8ee;
  --rust:#D45A2A; --rust-pale:#fff0ee;
  --teal:#2A8B8B; --navy:#1a1040; --gray:#6b7280; --border:#e5e7eb; --white:#fff;
}

/* CONTACT BAR */
.cbar{background:var(--green-dark);color:rgba(255,255,255,.85);padding:8px 20px;text-align:center;font-size:.77rem;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;}
.cbar a{color:#fde68a;font-weight:700;}

/* HERO */
.hero{background:var(--green-dark);color:#fff;padding:0;position:relative;overflow:hidden;}
.hero-wrap{position:relative;min-height:480px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
.hero-wrap > img.hero-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;z-index:0;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.18) 0%,rgba(0,0,0,.28) 55%,rgba(0,0,0,.45) 100%);z-index:1;}
.hero-content{position:relative;z-index:2;padding:36px 20px 32px;text-align:center;}
.hero-logo{margin-bottom:14px;}
.hero-logo img{height:90px;filter:drop-shadow(0 2px 12px rgba(0,0,0,.7));display:block;margin:0 auto;}
.eyebrow{display:inline-block;background:rgba(200,134,42,.35);border:1px solid rgba(200,134,42,.6);border-radius:100px;padding:6px 18px;font-size:.78rem;font-weight:700;letter-spacing:.9px;text-transform:uppercase;margin-bottom:10px;color:#fde68a;}
.hero h1{font-family:Montserrat,sans-serif;font-weight:900;font-size:clamp(2rem,6vw,3.4rem);margin-bottom:6px;line-height:1.15;text-shadow:0 2px 14px rgba(0,0,0,.55);color:#fff;}
.hero h1 span{color:#fde68a;}
.hero-mission{font-family:Montserrat,sans-serif;font-weight:900;font-size:1.15rem;color:#fde68a;letter-spacing:.8px;margin-bottom:12px;text-shadow:0 2px 8px rgba(0,0,0,.5);}
.hero-tag{font-size:1rem;opacity:.92;max-width:580px;margin:0 auto 22px;line-height:1.7;text-shadow:0 1px 6px rgba(0,0,0,.4);;color:rgba(255,255,255,.92);}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.hero-btns a,.hero-btns button{padding:11px 20px;border-radius:8px;font-family:Montserrat,sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;border:none;transition:.15s;}
.btn-gold{background:var(--gold);color:#fff;}
.btn-ow{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.4)!important;}

/* AUTO-SCROLL BANNER */
.mq-wrap{overflow:hidden;position:relative;height:180px;}
.mq-wrap::before,.mq-wrap::after{content:'';position:absolute;top:0;bottom:0;width:56px;z-index:2;pointer-events:none;}
.mq-wrap.dark::before{left:0;background:linear-gradient(to right,var(--green-dark),transparent);}
.mq-wrap.dark::after{right:0;background:linear-gradient(to left,var(--green-dark),transparent);}
.mq-wrap.light::before{left:0;background:linear-gradient(to right,var(--green-pale),transparent);}
.mq-wrap.light::after{right:0;background:linear-gradient(to left,var(--green-pale),transparent);}
.mq-track{display:flex;gap:12px;width:max-content;}
.mq-track:hover{animation-play-state:paused;}
.mq-fwd{animation:mq-scroll 32s linear infinite;}
.mq-rev{animation:mq-scroll-rev 37s linear infinite;}
.mq-slide{flex-shrink:0;border-radius:8px;overflow:hidden;width:240px;height:160px;display:block;}
.mq-slide img{width:240px;height:160px;object-fit:cover;display:block;flex-shrink:0;}


@media(max-width:520px){.grid2{grid-template-columns:1fr;}}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:12px;}
.prog-card{background:#fff;border-radius:10px;border:1px solid var(--green-border);padding:16px;transition:.15s;}
.prog-card:hover{box-shadow:0 4px 16px rgba(45,107,90,.12);transform:translateY(-2px);}
.prog-card .icon{font-size:1.7rem;margin-bottom:8px;}
.prog-card h4{font-family:Montserrat,sans-serif;font-weight:800;font-size:.86rem;color:var(--green);margin-bottom:5px;}
.prog-card p{font-size:.76rem;color:var(--gray);line-height:1.6;}

/* FORM */
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:.78rem;font-weight:600;color:var(--navy);margin-bottom:3px;}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:10px 12px;font-family:inherit;font-size:.86rem;outline:none;transition:.15s;background:#fff;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,107,90,.1);}

/* BUTTONS */
.sbtn{width:100%;padding:13px;border:none;border-radius:8px;font-family:Montserrat,sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;color:#fff;margin-top:12px;transition:.15s;}
.sbtn:hover{opacity:.9;transform:translateY(-1px);}
.bg-green{background:var(--green);} .bg-gold{background:var(--gold);} .bg-rust{background:var(--rust);} .bg-navy{background:var(--navy);}

/* ALERTS */
.ok{background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:13px 15px;font-size:.83rem;color:#166534;line-height:1.65;margin-top:10px;}
.er{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:8px;padding:13px 15px;font-size:.83rem;color:#991b1b;margin-top:10px;}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.chip{background:var(--green-pale);border:1px solid var(--green-border);border-radius:100px;padding:4px 11px;font-size:.7rem;font-weight:700;color:var(--green);font-family:Montserrat,sans-serif;}

/* NP GRID */
.np-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-top:14px;}

/* PRINT */
.print-row{display:flex;align-items:center;gap:12px;padding:13px;border:1.5px solid var(--green-border);border-radius:9px;margin-bottom:9px;background:#fff;flex-wrap:wrap;}
.print-row img{width:72px;border-radius:6px;flex-shrink:0;}
.print-info strong{display:block;font-family:Montserrat,sans-serif;font-weight:800;font-size:.84rem;color:var(--navy);margin-bottom:2px;}
.print-info span{font-size:.73rem;color:var(--gray);}

/* ADMIN */
.atbl{width:100%;border-collapse:collapse;font-size:.76rem;}
.atbl th{background:var(--green);color:#fff;padding:7px 9px;text-align:left;font-family:Montserrat,sans-serif;font-size:.7rem;}
.atbl td{padding:7px 9px;border-bottom:1px solid var(--border);vertical-align:top;}
.atbl tr:hover td{background:var(--green-pale);}
.bdg{display:inline-block;padding:2px 8px;border-radius:100px;font-size:.66rem;font-weight:700;font-family:Montserrat,sans-serif;}
.bdg-p{background:#fef9c3;color:#854d0e;} .bdg-a{background:#dcfce7;color:#166534;} .bdg-n{background:#ede9fe;color:#5b21b6;}

/* AFF */
.aff-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid #f0f0f0;margin-bottom:4px;background:transparent;flex-wrap:wrap;}
.aff-logo{width:34px;height:34px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem;}
.aff-info{flex:1;min-width:140px;}
.aff-info strong{display:block;font-family:Montserrat,sans-serif;font-weight:800;font-size:.86rem;color:var(--navy);margin-bottom:2px;}
.aff-info span{font-size:.73rem;color:var(--gray);line-height:1.5;display:block;}
.aff-comm{font-size:.68rem;color:var(--green);font-weight:700;margin-top:2px;}
.aff-btn{padding:8px 15px;border-radius:7px;font-family:Montserrat,sans-serif;font-weight:700;font-size:.75rem;color:#fff;white-space:nowrap;flex-shrink:0;}

/* FOOTER */
footer{display:block !important;background:#1a3d2f !important;color:rgba(255,255,255,.85) !important;text-align:center;padding:32px 20px;font-size:.8rem;margin-top:0;}
footer strong{color:#fff;} footer a{color:#fde68a;font-weight:600;}
.foot-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;max-width:700px;margin:14px auto 0;text-align:left;}
.foot-col h4{font-family:Montserrat,sans-serif;font-weight:800;color:#fff;font-size:.79rem;margin-bottom:7px;}
.foot-col a{display:block;color:rgba(255,255,255,.68);font-size:.73rem;margin-bottom:3px;}
.foot-col a:hover{color:#fde68a;}

.mq-placeholder{background:rgba(255,255,255,.08);border:1.5px dashed rgba(255,255,255,.25);}
.mq-placeholder.light-ph{background:rgba(45,107,90,.07);border:1.5px dashed rgba(45,107,90,.25);}
.mq-ph-inner{width:220px;height:148px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.mq-ph-icon{font-size:1.6rem;opacity:.4;}
.mq-ph-txt{font-family:Montserrat,sans-serif;font-size:.65rem;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.5px;}
.mq-wrap.light .mq-ph-txt{color:rgba(45,107,90,.45);}
.mq-wrap.light .mq-placeholder{background:rgba(45,107,90,.07);border-color:rgba(45,107,90,.25);}

<script>
// ── ACCORDION ─────────────────────────────────────────────────────────────
function accToggle(id,btn){
  var body=document.getElementById(id);
  if(!body)return;
  var isOpen=body.classList.contains('open');
  var panel=btn.closest('.panel');
  if(panel){
    panel.querySelectorAll('.acc-body.open').forEach(function(b){b.classList.remove('open');});
    panel.querySelectorAll('.acc-toggle.open').forEach(function(b){b.classList.remove('open');});
  }
  if(!isOpen){body.classList.add('open');btn.classList.add('open');}
}
// ── TABS ──────────────────────────────────────────────────────────────────
function sw(tab){
  ['home','programs','mentor','volunteer','register','print','resources','contact','admin'].forEach(function(t){
    var p=document.getElementById('panel-'+t),tb=document.getElementById('tab-'+t);
    if(p)p.classList.toggle('active',t===tab);
    if(tb)tb.classList.toggle('active',t===tab);
  });
  if(tab==='admin'){
    var u=sessionStorage.getItem('sogAdmin');
    if(u){document.getElementById('admin-gate').style.display='none';document.getElementById('admin-content').style.display='block';adminRole=u;updRole();initPrint();initBannerEditor();revealPrint();loadUsers();initDealsEditor();initAmazonEditor();}
  }
  window.scrollTo(0,0);
  // Auto-open first accordion in the newly active panel
  setTimeout(function(){
    var activePanel=document.getElementById('panel-'+tab);
    if(!activePanel)return;
    var firstAcc=activePanel.querySelector('.acc-toggle');
    var firstBody=activePanel.querySelector('.acc-body');
    if(firstAcc&&firstBody&&!firstBody.classList.contains('open')){
      firstAcc.classList.add('open');
      firstBody.classList.add('open');
    }
  },50);
}
// ── UTILS ─────────────────────────────────────────────────────────────────
function gv(id){return(document.getElementById(id)||{value:''}).value.trim();}
function ok(id,msg){var el=document.getElementById(id);if(el)el.innerHTML='<div class="ok">'+msg+'</div>';}
function er(id,msg){var el=document.getElementById(id);if(el)el.innerHTML='<div class="er">'+msg+'</div>';}
// ── GOOGLE SHEET POST ─────────────────────────────────────────────────────
function post(data,resultId){
  var url=SOG_URL||localStorage.getItem('sogSheetURL')||'';
  if(!url){if(resultId)er(resultId,'Admin must connect Google Sheet in Admin tab.');return;}
  data.Timestamp=new Date().toLocaleString();
  var iid='_sog_'+Date.now();
  var ifr=document.createElement('iframe');ifr.name=iid;ifr.style.display='none';document.body.appendChild(ifr);
  var frm=document.createElement('form');frm.method='POST';frm.action=url;frm.target=iid;frm.style.display='none';
  Object.keys(data).forEach(function(k){var i=document.createElement('input');i.type='hidden';i.name=k;i.value=data[k]||'';frm.appendChild(i);});
  document.body.appendChild(frm);frm.submit();
  setTimeout(function(){if(ifr.parentNode)ifr.parentNode.removeChild(ifr);if(frm.parentNode)frm.parentNode.removeChild(frm);},5000);
}
// ── VOLUNTEER FORMS ───────────────────────────────────────────────────────
function regWed(){
  var f=gv('wed-first'),l=gv('wed-last'),e=gv('wed-email'),a=document.getElementById('wed-agree');
  if(!f||!l||!e){er('wed-result','Please fill in all required fields.');return;}
  if(!a||!a.checked){er('wed-result','Please agree to the delivery guidelines.');return;}
  post({formName:'SOG_WedDelivery',First:f,Last:l,Email:e,Phone:gv('wed-phone'),Date:gv('wed-date'),Transportation:gv('wed-transport'),BackgroundCheck:gv('wed-bgcheck'),EmergencyContact:gv('wed-emergency'),Status:'Pending'},'wed-result');
  ok('wed-result','<strong>Thank you for registering!</strong><br>You will be notified once we receive your information. We will reach out to schedule on your preferred dates.');
  ['wed-first','wed-last','wed-email','wed-phone','wed-date','wed-emergency'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  if(a)a.checked=false;
}
function regThu(){
  var f=gv('thu-first'),l=gv('thu-last'),e=gv('thu-email'),ac=gv('thu-activity');
  if(!f||!l||!e||!ac){er('thu-result','Please fill in all required fields.');return;}
  post({formName:'SOG_ThuActivities',First:f,Last:l,Email:e,Phone:gv('thu-phone'),Activity:ac,Date:gv('thu-date'),Role:gv('thu-role'),Notes:gv('thu-notes'),Status:'Confirmed'},'thu-result');
  ok('thu-result','<strong>You are signed up!</strong><br>Thank you '+f+'! Your spot for <strong>'+ac+'</strong> is confirmed.');
  ['thu-first','thu-last','thu-email','thu-phone','thu-notes'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
}
function regTue(){
  var f=gv('tue-first'),l=gv('tue-last'),e=gv('tue-email'),o=gv('tue-org'),tp=gv('tue-topic'),ty=gv('tue-type');
  if(!f||!l||!e||!o||!tp||!ty){er('tue-result','Please fill in all required fields.');return;}

// ── ADMIN ─────────────────────────────────────────────────────────────────
function checkPW(){
  var pw=gv('admin-pw'),mgrPW=localStorage.getItem('sogMgrPW')||'';
  var pwMap=JSON.parse(localStorage.getItem('sogUserPWs')||'{}');
  var matchedUser=null;
  Object.keys(pwMap).forEach(function(email){if(pwMap[email].pw===pw)matchedUser=pwMap[email];});
  if(pw===ADMIN_PW)adminRole='admin';
  else if(mgrPW&&pw===mgrPW)adminRole='manager';
  else if(matchedUser){adminRole=matchedUser.role||'viewer';}
  else{document.getElementById('admin-pw-err').textContent='Incorrect password.';document.getElementById('admin-pw').value='';return;}
  sessionStorage.setItem('sogAdmin',adminRole);
  document.getElementById('admin-gate').style.display='none';
  document.getElementById('admin-content').style.display='block';
  updRole();initPrint();initBannerEditor();revealPrint();loadUsers();initDealsEditor();initAmazonEditor();
  var u=localStorage.getItem('sogSheetURL')||'';
  var inp=document.getElementById('sog-url');if(inp&&u)inp.value=u;
  updURLStatus();
}
function updRole(){
  var lbl=document.getElementById('admin-role-lbl'),ms=document.getElementById('mgr-section');
  var mn=localStorage.getItem('sogMgrName')||'Manager';
  if(lbl)lbl.textContent=adminRole==='admin'?'Logged in as Admin':'Logged in as Manager: '+mn;
  if(ms)ms.style.display=adminRole==='admin'?'block':'none';
}
function doLogout(){
  sessionStorage.removeItem('sogAdmin');adminRole='';
  document.getElementById('admin-gate').style.display='block';
  document.getElementById('admin-content').style.display='none';
  document.getElementById('admin-pw').value='';
}
function saveURL(){
  var u=gv('sog-url');
  if(u){SOG_URL=u;localStorage.setItem('sogSheetURL',u);updURLStatus();alert('Sheet URL saved!');}
  else alert('Please enter a valid URL.');
}
function updURLStatus(){
  var s=document.getElementById('url-status'),u=localStorage.getItem('sogSheetURL')||'';
  if(s){s.textContent=u?'Connected: '+u.substring(0,55)+'...':'Not connected';s.style.color=u?'var(--green)':'#dc2626';}
  if(u)SOG_URL=u;
}
function loadData(sheet){
  var url=localStorage.getItem('sogSheetURL')||'';
  if(!url){alert('Please save your Sheet URL first.');return;}
  var labels={'SOG_WedDelivery':'Wed Delivery','SOG_ThuActivities':'Thu Activities','SOG_TueResources':'Tue Resources','SOG_Mentors':'Mentors','SOG_General':'General Registrations','SOG_Contacts':'Contacts'};
  document.getElementById('tbl-title').textContent=(labels[sheet]||sheet)+' — Registrations';
  document.getElementById('tbl-wrap').innerHTML='<div style="text-align:center;padding:20px;color:var(--gray);">Loading...</div>';
  fetch(url+'?pw=SOG_ADMIN_2026&sheet='+sheet)
    .then(function(r){return r.json();})
    .then(function(rows){
      if(!rows||!rows.length){document.getElementById('tbl-wrap').innerHTML='<div style="text-align:center;padding:20px;color:var(--gray);">No records yet.</div>';document.getElementById('tbl-count').textContent='0 records';return;}
      var keys=Object.keys(rows[0]);
      var h='<table class="atbl"><thead><tr><th>#</th>';
      keys.forEach(function(k){h+='<th>'+k+'</th>';});h+='</tr></thead><tbody>';
      rows.forEach(function(row,i){
        h+='<tr><td>'+(i+1)+'</td>';
        keys.forEach(function(k){var v=row[k]||'';h+='<td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+v+'">'+v+'</td>';});
        h+='</tr>';
      });
      h+='</tbody></table>';
      document.getElementById('tbl-wrap').innerHTML=h;
      document.getElementById('tbl-count').textContent=rows.length+' record'+(rows.length!==1?'s':'');
    })
    .catch(function(e){document.getElementById('tbl-wrap').innerHTML='<div class="er">Could not load data.<br><small>'+e.message+'</small></div>';});
}
function revealPrint(){
  var msg=document.getElementById('print-public-msg');
  var wrap=document.getElementById('print-content-wrap');
  if(msg)msg.style.display='none';
  if(wrap)wrap.style.display='block';
}
function initPrint(){
  var wrap=document.getElementById('print-rows');if(!wrap)return;
  var labels={'vol':'Volunteer Flyer','corp':'Corporate Partnership Flyer','amb':'School Ambassador Flyer','overview':'SOG Overview','softskills':'Soft Skills Overview','senior':'Senior Services Guide'};
  var h='';
  PRINT_KEYS.forEach(function(k){
    var saved=localStorage.getItem('sog-print-'+k)||'';
    h+='<div style="margin-bottom:9px;"><label style="font-size:.74rem;font-weight:600;color:var(--navy);display:block;margin-bottom:3px;">'+(labels[k]||k)+'</label>';
    h+='<input type="url" id="pl-'+k+'" value="'+saved+'" placeholder="Paste Google Drive share link..." style="width:100%;border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:.76rem;font-family:inherit;"></div>';
  });
  wrap.innerHTML=h;
}
function savePrint(){
  PRINT_KEYS.forEach(function(k){var inp=document.getElementById('pl-'+k);if(inp)localStorage.setItem('sog-print-'+k,inp.value.trim());});
  var s=document.getElementById('print-status');
  if(s){s.textContent='Print links saved!';setTimeout(function(){s.textContent='';},3000);}
  updPrintBtns();
}
function updPrintBtns(){
  PRINT_KEYS.forEach(function(k){
    var link=localStorage.getItem('sog-print-'+k)||'';
    document.querySelectorAll('[data-print-key="'+k+'"]').forEach(function(btn){
      if(link){btn.href=link;btn.textContent='Download →';}
    });
  });
}
function saveMgr(){
  var n=gv('mgr-name'),pw=gv('mgr-pw'),e=gv('mgr-email'),res=document.getElementById('mgr-result');
  if(!n||!pw){res.textContent='Please enter name and password.';res.style.color='#dc2626';return;}
  localStorage.setItem('sogMgrPW',pw);localStorage.setItem('sogMgrName',n);
  if(e)localStorage.setItem('sogMgrEmail',e);
  res.textContent='Manager settings saved! '+n+' can now log in.';res.style.color='var(--green)';
}
// ── USER MANAGEMENT ───────────────────────────────────────────────────────
function loadUsers(){
  var users=JSON.parse(localStorage.getItem('sogUsers')||'[]');
  var wrap=document.getElementById('user-list');
  if(!wrap)return;
  if(!users.length){wrap.innerHTML='<div style="font-size:.76rem;color:var(--gray);padding:8px 0;">No users added yet.</div>';return;}
  var h='<table style="width:100%;border-collapse:collapse;font-size:.76rem;"><thead><tr style="background:var(--green-pale);"><th style="padding:6px 8px;text-align:left;">Name</th><th style="padding:6px 8px;text-align:left;">Email</th><th style="padding:6px 8px;text-align:left;">Access</th><th></th></tr></thead><tbody>';
  users.forEach(function(u,i){
    h+='<tr style="border-bottom:1px solid var(--border);"><td style="padding:6px 8px;">'+u.name+'</td><td style="padding:6px 8px;">'+u.email+'</td><td style="padding:6px 8px;"><span class="bdg '+(u.role==='editor'?'bdg-a':'bdg-n')+'">'+u.role+'</span></td><td style="padding:6px 8px;"><button onclick="removeUser('+i+')" style="background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:5px;padding:3px 8px;font-size:.68rem;cursor:pointer;">Remove</button></td></tr>';
  });
  h+='</tbody></table>';
  wrap.innerHTML=h;
}
function addUser(){
  var name=(document.getElementById('new-user-name')||{value:''}).value.trim();
  var email=(document.getElementById('new-user-email')||{value:''}).value.trim();
  var role=(document.getElementById('new-user-role')||{value:'viewer'}).value;
  var pw=(document.getElementById('new-user-pw')||{value:''}).value.trim();
  var status=document.getElementById('user-add-status');
  if(!name||!email){if(status)status.textContent='Please enter name and email.';return;}
  var users=JSON.parse(localStorage.getItem('sogUsers')||'[]');
  users.push({name:name,email:email,role:role,pw:pw,added:new Date().toLocaleDateString()});
  localStorage.setItem('sogUsers',JSON.stringify(users));
  if(pw){var pwMap=JSON.parse(localStorage.getItem('sogUserPWs')||'{}');pwMap[email]={name:name,role:role,pw:pw};localStorage.setItem('sogUserPWs',JSON.stringify(pwMap));}
  if(status)status.textContent=name+' added!';
  ['new-user-name','new-user-email','new-user-pw'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  loadUsers();
}
function removeUser(idx){
  var users=JSON.parse(localStorage.getItem('sogUsers')||'[]');
  var removed=users.splice(idx,1)[0];
  localStorage.setItem('sogUsers',JSON.stringify(users));
  if(removed&&removed.email){var pwMap=JSON.parse(localStorage.getItem('sogUserPWs')||'{}');delete pwMap[removed.email];localStorage.setItem('sogUserPWs',JSON.stringify(pwMap));}
  loadUsers();
}
// ── DEALS EDITOR ──────────────────────────────────────────────────────────
function loadDeals(){
  var sq=localStorage.getItem('deal-square')||'';
  var ff=localStorage.getItem('deal-fireflies')||'';
  var sqEl=document.getElementById('square-deal');
  var ffEl=document.getElementById('fireflies-deal');
  if(sqEl&&sq)sqEl.textContent='Special: '+sq;
  if(ffEl&&ff)ffEl.textContent='Special: '+ff;

function initDealsEditor(){

  if(!wrap)return;

// ── AMAZON EDITOR ─────────────────────────────────────────────────────────
function loadAmazonItems(){
  var extra=JSON.parse(localStorage.getItem('sogAmazonItems')||'[]');
  var wrap=document.getElementById('amazon-extra-items');
  if(!wrap||!extra.length)return;
  wrap.innerHTML=extra.map(function(item){
    return '<div class="aff-row" style="align-items:center;"><div class="aff-logo" style="background:#FF9900;font-weight:900;font-size:.9rem;color:#000;">a</div><div class="aff-info"><strong>'+item.name+'</strong><span>'+item.desc+'</span></div><a href="'+item.url+'" target="_blank" class="aff-btn" style="background:#FF9900;color:#000;">Shop &rarr;</a></div>';
  }).join('');
}
function initAmazonEditor(){
  var items=JSON.parse(localStorage.getItem('sogAmazonItems')||'[]');
  var wrap=document.getElementById('amazon-editor-rows');
  if(!wrap)return;
  wrap.innerHTML='';
  items.forEach(function(item,i){
    var row=document.createElement('div');
    row.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:6px;';
    var s='border:1.5px solid #e5e7eb;border-radius:6px;padding:6px 8px;font-size:.74rem;font-family:inherit;';
    var n=document.createElement('input');n.type='text';n.value=item.name||'';n.placeholder='Item name';n.style.cssText=s;n.dataset.idx=i;n.dataset.field='name';n.addEventListener('change',function(){updateAI(+this.dataset.idx,this.dataset.field,this.value);});
    var d=document.createElement('input');d.type='text';d.value=item.desc||'';d.placeholder='Description';d.style.cssText=s;d.dataset.idx=i;d.dataset.field='desc';d.addEventListener('change',function(){updateAI(+this.dataset.idx,this.dataset.field,this.value);});
    var u=document.createElement('input');u.type='url';u.value=item.url||'';u.placeholder='Amazon URL';u.style.cssText=s;u.dataset.idx=i;u.dataset.field='url';u.addEventListener('change',function(){updateAI(+this.dataset.idx,this.dataset.field,this.value);});
    var rm=document.createElement('button');rm.textContent='\u2715';rm.style.cssText='background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:5px;padding:5px 8px;font-size:.7rem;cursor:pointer;';rm.dataset.idx=i;rm.addEventListener('click',function(){removeAmazonItem(+this.dataset.idx);});
    row.appendChild(n);row.appendChild(d);row.appendChild(u);row.appendChild(rm);
    wrap.appendChild(row);
  });
}
var _amazonItems=JSON.parse(localStorage.getItem('sogAmazonItems')||'[]');
function updateAI(i,field,val){_amazonItems[i][field]=val;localStorage.setItem('sogAmazonItems',JSON.stringify(_amazonItems));}
function removeAmazonItem(i){_amazonItems.splice(i,1);localStorage.setItem('sogAmazonItems',JSON.stringify(_amazonItems));initAmazonEditor();loadAmazonItems();}
function addAmazonItem(){_amazonItems.push({name:'',desc:'',url:'https://amazon.com'});localStorage.setItem('sogAmazonItems',JSON.stringify(_amazonItems));initAmazonEditor();}
function saveAmazonItems(){localStorage.setItem('sogAmazonItems',JSON.stringify(_amazonItems));loadAmazonItems();var s=document.getElementById('amazon-save-status');if(s){s.textContent='Saved!';setTimeout(function(){s.textContent='';},2500);}}
// ── BANNER MANAGER ────────────────────────────────────────────────────────
function loadBannerPhotosOnInit(){
  var hasCustom=localStorage.getItem('sogBannerCustomized');
  if(hasCustom){var s=JSON.parse(localStorage.getItem('sogBannerPhotos')||'[]');if(s.length)applyBannerPhotos(s);}
}
function applyBannerPhotos(urls){
  if(!urls||!urls.length)return;
  var trackW=urls.length*232;
  var styleEl=document.getElementById('banner-anim-style');
  if(!styleEl){styleEl=document.createElement('style');styleEl.id='banner-anim-style';document.head.appendChild(styleEl);}
  styleEl.textContent='@keyframes mq-scroll{0%{transform:translateX(0);}100%{transform:translateX(-'+trackW+'px);}}@keyframes mq-scroll-rev{0%{transform:translateX(-'+trackW+'px);}100%{transform:translateX(0);}}';
  function makeSlides(rev){var arr=rev?urls.slice().reverse():urls;return arr.concat(arr).map(function(u){return '<div class="mq-slide"><img src="'+u+'" alt="SOG" style="width:240px;height:160px;object-fit:cover;display:block;border-radius:8px;"></div>';}).join('');}
  var fwd=document.querySelector('.mq-track.mq-fwd');var rev=document.querySelector('.mq-track.mq-rev');
  if(fwd)fwd.innerHTML=makeSlides(false);if(rev)rev.innerHTML=makeSlides(true);
}
function initBannerEditor(){
  var wrap=document.getElementById('banner-url-rows');if(!wrap)return;
  var saved=JSON.parse(localStorage.getItem('sogBannerPhotos')||'[]');
  if(!saved.length)saved=['','','','','','','',''];
  wrap.innerHTML='';saved.forEach(function(url,i){addBannerRow(url,i);});
}
function addBannerSlot(){var wrap=document.getElementById('banner-url-rows');if(!wrap)return;var rows=wrap.querySelectorAll('.banner-url-row');if(rows.length>=20){alert('Maximum 20 photos.');return;}addBannerRow('',rows.length);}
function addBannerRow(url,idx){
  var wrap=document.getElementById('banner-url-rows');if(!wrap)return;
  var div=document.createElement('div');div.className='banner-url-row';div.style.cssText='display:flex;gap:6px;align-items:center;margin-bottom:7px;';
  div.innerHTML='<span style="font-size:.7rem;color:var(--gray);min-width:18px;text-align:right;">'+(idx+1)+'</span><input type="url" placeholder="Paste photo URL" value="'+url+'" style="flex:1;border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:.76rem;font-family:inherit;"><button onclick="this.parentElement.remove();renumberBannerRows();" style="background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:5px;padding:5px 10px;font-size:.72rem;cursor:pointer;">&#10005;</button>';
  wrap.appendChild(div);
}
function renumberBannerRows(){var rows=document.querySelectorAll('.banner-url-row');rows.forEach(function(r,i){var s=r.querySelector('span');if(s)s.textContent=(i+1);});}
function saveBannerPhotos(){
  var urls=[];document.querySelectorAll('.banner-url-row input').forEach(function(inp){var v=inp.value.trim();if(v)urls.push(v);});
  localStorage.setItem('sogBannerPhotos',JSON.stringify(urls));localStorage.setItem('sogBannerCustomized','1');
  applyBannerPhotos(urls);
  var s=document.getElementById('banner-save-status');if(s){s.textContent=urls.length+' photos saved!';setTimeout(function(){s.textContent='';},3000);}
}
